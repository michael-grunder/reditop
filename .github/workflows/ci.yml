name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run test suite
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  build-artifacts:
    name: Build ${{ matrix.artifact_name }}
    needs: verify
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: reditop-aarch64-apple-darwin
            os: macos-14
            target: aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/reditop
            cargo_command: cargo build --locked --release --target aarch64-apple-darwin
            setup_zig: false
          - artifact_name: reditop-x86_64-unknown-linux-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_path: target/x86_64-unknown-linux-musl/release/reditop
            cargo_command: cargo zigbuild --locked --release --target x86_64-unknown-linux-musl
            setup_zig: true
          - artifact_name: reditop-aarch64-unknown-linux-musl
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_path: target/aarch64-unknown-linux-musl/release/reditop
            cargo_command: cargo zigbuild --locked --release --target aarch64-unknown-linux-musl
            setup_zig: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install Zig
        if: matrix.setup_zig
        uses: mlugg/setup-zig@v1

      - name: Install cargo-zigbuild
        if: matrix.setup_zig
        run: cargo install --locked cargo-zigbuild

      - name: Build release binary
        run: ${{ matrix.cargo_command }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error
